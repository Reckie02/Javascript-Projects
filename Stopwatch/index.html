<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/e8c1a12266.js" crossorigin="anonymous"></script>
    <title>Stopwatch</title>
</head>
<body>
    <div class="stopwatch">
        <h2 class="title">Stopwatch</h2>
        <h1 id="time">00:00:00</h1>
        <div class="buttons">
            <div onclick="watchStop()"><i class="fa-solid fa-stop"></i></div>
            <div onclick="watchStart()"><i class="fa-solid fa-play"></i></div>
            <div onclick="watchReset()"><i class="fa-solid fa-redo"></i></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
