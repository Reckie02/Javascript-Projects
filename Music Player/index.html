<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/e8c1a12266.js" crossorigin="anonymous"></script>
    <title>Music Player</title>
    
</head>
<body>
   <div class="container">
    <div class="music-player">
        <nav>
            <div class="circle">
                <i class="fa-solid fa-angle-left"></i>
            </div>
            <div class="circle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>
        <img src="media/images/thumbnail.jpg" class="song-img">
        <h1>Chemtrails Over The Country Club</h1>
        <p>Lana Del Ray</p>

        <audio id="song">
            <source src="media\Music\chemtrails over the country club.mp4" type="audio/mp3">
        </audio>
        <input type="range" value="0" id="progress">
        <div class="time">0:00 / 0:00 </div>

        <div class="controls">
            <div><i class="fa-solid fa-backward"></i></div>
            <div onclick="playPause()"><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
            <div><i class="fa-solid fa-forward"></i></div>
        </div>
    </div>
   </div> 
   <script src="script.js"></script>
</body>
</html>
