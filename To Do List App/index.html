<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do List App</title>
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h2><img src="images/todo-icon.png" > To Do List App </h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add a new task" spellcheck="false"> &nbsp;
                <input type="date" id="task-date"> &nbsp;
                <input type="time" id="task-time"> &nbsp;
                <button onclick="addTask()">Add</button>
            </div>
            <ul class="list-container" id="list-container">
                <!-- <li class="completed">Go to the gym <span>
                <li>Buy groceries <span>
                <li>Finish project <span> -->
            </ul>
            <button class="clear" onclick="deleteAll()">Delete All</button>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
