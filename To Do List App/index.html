<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Daily To Do List App</title>
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="row">
                <div class="col">
                    <h2><img src="images/todo-icon.png" > To Do List App </h2>
                </div>
                <div class="col-date">
                    <input type="date" id="task-date"> &nbsp;
                </div>
            </div>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add a new task" spellcheck="false">
                <input type="time" id="task-time"> 
                <button onclick="addTask()">Add</button>
            </div>
            <div class="list-container">
            <ul id="list-container">
                
            </ul>
            </div>
            <div class="clear">
                <button onclick="deleteAll()">Delete All</button>
            </div>    
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
